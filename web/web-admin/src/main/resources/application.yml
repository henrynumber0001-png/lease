server:
  port: 8080

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/lease?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2b8
    username: root
    password: "123456"
    hikari:
      connection-test-query: SELECT 1 # 自动检测连接
      connection-timeout: 60000 #数据库连接超时时间,默认30秒
      idle-timeout: 500000 #空闲连接存活最大时间，默认600000（10分钟）
      max-lifetime: 540000 #此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认1800000即30分钟
      maximum-pool-size: 12 #连接池最大连接数，默认是10
      minimum-idle: 10 #最小空闲连接数量
      pool-name: dataHikariPool # 连接池名称
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  jackson:
    time-zone: GMT+8
  data:
    redis:
      host: localhost
      port: 6379
      database: 0


#用于打印框架生成的sql语句，便于调试
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

  type-aliases-package: com.nocompanyname.lease.web.admin.vo,com.nocompanyname.lease.model.entity
#  mapper-locations: classpath:/mapper/*.xml
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: lease

jwt:
  issuer: web-admin
  secret-key: ${JWT_SECRET_KEY} #读取操作系统或 IDEA 运行配置中的 JWT_SECRET_KEY
  ttl-seconds: 36000
#不建议给生产密钥设置固定默认值
#终端环境变量和 IDEA 运行配置中的环境变量是两套启动环境。
#即使终端中为空，只要 IDEA 的 Environment variables 中设置了，使用 IDEA 启动时仍然可以正常读取。

